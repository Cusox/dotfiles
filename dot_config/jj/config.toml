#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Cusox"
email = "cusoxlee@gmail.com"

[ui]
pager = "delta"
diff-formatter = ":git"
editor = "nvim"
merge-editor = "vimdiff"

[merge-tools.nvimdiff]
program = "nvim"
merge-args = [
  "-f",
  "-d",
  "$output",
  "-M",
  "$left",
  "$base",
  "$right",
  "-c", "wincmd J",
  "-c", "set modifiable",
  "-c", "set write",
]
merge-tool-edits-conflict-markers = true
